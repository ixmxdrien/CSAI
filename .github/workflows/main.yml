name : Continuous Integration CSAI

on:
  push:
    branches: [ main ]
  
jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
        
      - name: pip install uv
        uses: astral-sh/uv@v1

      - name: Install dependencies
        run: |
          cd backend
          uv sync
        
      - name: lint (ruff)
        working-directory: backend
        run: |
          uv add ruff
          ruff check .
        
      - name: Tests (pytest)
        working-directory: backend/tests
        run: |
          uv add pytest pytest-asyncio
          pytest -v
  
  
  frontend:
    name: Frontend CSAII
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Tests
        working-directory: frontend
        run: npm test --if-present -- --watch=false

      - name: Build
        working-directory: frontend
        run: npm run build